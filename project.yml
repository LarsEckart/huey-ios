name: HueyIOS
options:
  bundleIdPrefix: com.larseckart
  deploymentTarget:
    iOS: "18.0"

targets:
  HueyIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Hue
      - path: Sources/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.larseckart.hueyios
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: "1"
      DEVELOPMENT_TEAM: 5N98B42MGR
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: Config/Info.plist
      SWIFT_VERSION: "6.0"
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
